services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zelthir}
      POSTGRES_USER: ${POSTGRES_USER:-zelthir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zelthir_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zelthir} -d ${POSTGRES_DB:-zelthir}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
